<div class="container" style="display: block !important; visibility: visible !important;">
  <div class="header">
    <div class="lang-toggle" (click)="toggleLanguage()">
      <span>{{ translationService.getCurrentLanguage().code === 'he' ? 'EN' : 'HE' }}</span>
    </div>
    <h1>{{ translationService.translate('appTitle') }}</h1>
    <p>{{ translationService.translate('appSubtitle') }}</p>
  </div>

  <div class="content">
    <div class="screen active">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>{{ translationService.translate('fullName') }}</label>
          <input 
            type="text" 
            formControlName="name" 
            [placeholder]="translationService.getCurrentLanguage().code === 'he' ? 'למשל: שרה כהן' : 'e.g., Sarah Cohen'"
          >
        </div>

        <div class="form-group">
          <label>{{ translationService.translate('loginCode') }}</label>
          <input 
            type="text" 
            formControlName="code" 
            [placeholder]="translationService.getCurrentLanguage().code === 'he' ? 'הקוד שקיבלת מהמנהל' : 'Code from manager'"
          >
          <div style="margin-top: 8px; font-size: 13px; color: var(--gray-600);">
            {{ translationService.getCurrentLanguage().code === 'he' ? 'לדוגמה: עובדת1234' : 'e.g., worker1234' }}
          </div>
        </div>

        <div *ngIf="errorMessage" class="alert alert-warning">
          {{ errorMessage }}
        </div>

        <button type="submit" [disabled]="!loginForm.valid || isLoading">
          {{ isLoading ? '...' : translationService.translate('login') }}
        </button>
      </form>
    </div>
  </div>
</div>
