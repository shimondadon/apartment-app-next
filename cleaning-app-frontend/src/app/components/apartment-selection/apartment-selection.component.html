 <div *ngIf="loadingApartments" class="apartment-grid" style="padding: 24px; text-align: center; color: var(--gray-600)">
  טוען דירות…
</div>

<div *ngIf="!loadingApartments && apartments.length === 0" class="apartment-grid" style="padding: 24px; text-align: center">
  לא ניתן לטעון דירות. בדקו שהשרת רץ.
</div>

<div class="apartment-grid" *ngIf="!loadingApartments && apartments.length > 0">
  <div
    *ngFor="let apartment of apartments"
    class="apartment-card"
    [class.selected]="selectedApartmentId === apartment.id"
    (click)="selectApartment(apartment.id)"
  >
    <div class="icon">{{ apartment.icon }}</div>
    <div class="name">{{ apartment.name }}</div>
    <div class="subtitle" *ngIf="apartment.badges && apartment.badges.length > 0">
      <span
        *ngFor="let badge of apartment.badges"
        class="badge"
        [class.badge-new]="badge.type === 'new'"
        [class.badge-special]="badge.type === 'special'"
      >
        {{ badge.label }}
      </span>
    </div>
  </div>
</div>
